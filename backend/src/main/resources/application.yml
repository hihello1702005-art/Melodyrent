spring:
  application:
    name: melodyrent
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/melodyrent?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USERNAME:melodyrent}
    password: ${DB_PASSWORD:melodyrent}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 100MB
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api
app:
  jwt:
    secret: ${JWT_SECRET:change-me-to-a-very-long-256-bit-secret-for-production-use-only}
    access-token-minutes: ${JWT_ACCESS_MINUTES:30}
    refresh-token-days: ${JWT_REFRESH_DAYS:14}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:demo}
  api-key: ${CLOUDINARY_API_KEY:demo}
  api-secret: ${CLOUDINARY_API_SECRET:demo}
springdoc:
  swagger-ui:
    path: /docs
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
